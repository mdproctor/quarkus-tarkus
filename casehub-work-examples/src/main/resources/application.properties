# Datasource — H2 in-memory, survives JVM lifetime
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:workitems-examples;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true

# WorkItem defaults
casehub.work.default-expiry-hours=168
casehub.work.default-claim-hours=24

# Ledger — all features enabled
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=true
casehub.ledger.evidence.enabled=true
casehub.ledger.attestations.enabled=true
casehub.ledger.trust-score.enabled=true
casehub.ledger.trust-score.decay-half-life-days=90
