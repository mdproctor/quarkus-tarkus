# H2 in-memory datasource
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:workitems-flow-examples;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true

# Disable scheduler — examples drive everything via REST
quarkus.scheduler.enabled=false

# WorkItem defaults
quarkus.workitems.default-expiry-hours=168
quarkus.workitems.default-claim-hours=24
