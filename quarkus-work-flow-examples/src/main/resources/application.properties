# H2 in-memory datasource
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:work-flow-examples;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true

# Disable scheduler — examples drive everything via REST
quarkus.scheduler.enabled=false

# WorkItem defaults
quarkus.work.default-expiry-hours=168
quarkus.work.default-claim-hours=24
