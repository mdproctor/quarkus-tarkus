quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:reportstest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.scheduler.enabled=false
casehub.work.default-expiry-hours=24
casehub.work.default-claim-hours=4
casehub.work.cleanup.expiry-check-seconds=60
quarkus.cache.caffeine.reports.expire-after-write=1s
