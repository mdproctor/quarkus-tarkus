# Use random port to avoid TIME_WAIT conflicts between QuarkusTest classes
quarkus.http.test-port=0

# H2 in-memory datasource for work-flow integration tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:workitemsflowtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.scheduler.enabled=false
quarkus.work.default-expiry-hours=24
quarkus.work.default-claim-hours=4
quarkus.work.cleanup.expiry-check-seconds=60
