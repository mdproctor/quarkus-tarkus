# H2 datasource for JPA entities that come from the core module (LabelVocabulary, etc.)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# MongoDB is provided by Quarkus Dev Services (Testcontainers) — no explicit URI needed
quarkus.mongodb.database=workitems

# Avoid port conflicts when multiple @QuarkusTest classes boot Quarkus
quarkus.http.test-port=0
