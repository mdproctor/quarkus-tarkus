# Use random port to avoid TIME_WAIT conflicts between QuarkusTest classes
quarkus.http.test-port=0

# H2 in-memory datasource for tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# Disable scheduler in tests
quarkus.scheduler.enabled=false

# WorkItems config (use short values for deadline tests)
quarkus.work.default-expiry-hours=24
quarkus.work.default-claim-hours=4
quarkus.work.cleanup.expiry-check-seconds=60
