# Tarkus extension default configuration
# Consuming applications override these as needed.
# Datasource (quarkus.datasource.*) must be configured by the consuming app.

# Default WorkItem expiry (hours) when none is specified on creation
quarkus.tarkus.default-expiry-hours=24

# Escalation policy when a WorkItem expires: notify | reassign | auto-reject
quarkus.tarkus.escalation-policy=notify

# How often the expiry cleanup job runs (seconds)
quarkus.tarkus.cleanup.expiry-check-seconds=60
