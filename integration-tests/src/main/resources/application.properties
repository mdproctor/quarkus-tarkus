# Integration test app — embedded in the packaged artifact
# H2 in-memory datasource for JVM and native integration tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:workitems-it;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.scheduler.enabled=false

# WorkItems defaults
quarkus.work.default-expiry-hours=24
quarkus.work.default-claim-hours=4
quarkus.work.escalation-policy=notify
quarkus.work.claim-escalation-policy=notify
quarkus.work.cleanup.expiry-check-seconds=60
