# Integration test app — embedded in the packaged artifact
# H2 in-memory datasource for JVM and native integration tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tarkus-it;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.scheduler.enabled=false

# Tarkus defaults
quarkus.tarkus.default-expiry-hours=24
quarkus.tarkus.default-claim-hours=4
quarkus.tarkus.escalation-policy=notify
quarkus.tarkus.claim-escalation-policy=notify
quarkus.tarkus.cleanup.expiry-check-seconds=60
