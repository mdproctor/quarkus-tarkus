# Random port prevents TIME_WAIT conflicts when multiple @QuarkusTest classes restart Quarkus
quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ledgertest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
# V1__initial_schema.sql (from quarkus-work), quarkus-ledger V1000/V1001 migrations (ledger_entry,
# ledger_attestation, actor_trust_score tables), and V1002__work_item_ledger_entry.sql (from this
# module) are all on the classpath under db/migration/; Flyway picks up all automatically.
quarkus.flyway.locations=db/migration
quarkus.scheduler.enabled=false
quarkus.work.default-expiry-hours=24
quarkus.work.default-claim-hours=4
quarkus.work.cleanup.expiry-check-seconds=60
quarkus.ledger.enabled=true
quarkus.ledger.hash-chain.enabled=true
quarkus.ledger.decision-context.enabled=true
quarkus.ledger.evidence.enabled=true
quarkus.ledger.attestations.enabled=true
quarkus.ledger.trust-score.enabled=true
# Map the "qhorus" named persistence unit to the default test datasource
# (TrustScoreJob and LedgerVerificationService use @PersistenceUnit("qhorus"))
